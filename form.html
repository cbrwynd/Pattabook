<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wayanad Police - Patta Book Signing</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#eef2ff; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.container { background:#fff; padding:20px 25px; max-width:500px; width:95%; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.2); text-align:center; position:relative; }
h1,h2 { color:#1d4ed8; margin:5px 0; }
input,select,button { width:90%; padding:10px; margin:8px 0; font-size:15px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; }
input[readonly]{ background:#f0f4ff; }
button { background:#1d4ed8; color:#fff; border:none; cursor:pointer; font-size:16px; }
button:disabled { background:gray; cursor:not-allowed; }
/* Loader overlay */
.overlay { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); border-radius:15px; justify-content:center; align-items:center; flex-direction:column; z-index:10; }
.spinner { border:5px solid #eee; border-top:5px solid #1d4ed8; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin-bottom:10px; }
@keyframes spin{ 100%{ transform:rotate(360deg); } }
/* Success popup */
.success-popup { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#1d4ed8; color:#fff; padding:20px 30px; border-radius:10px; font-size:18px; z-index:20; }
</style>
</head>
<body>
<div class="container">
  <h1>WAYANAD POLICE</h1>
  <h2>PATTA BOOK SIGNING SYSTEM</h2>

  <input id="id" placeholder="ID" readonly>
  <input id="point" placeholder="Point" readonly>
  <input id="place" placeholder="Place" readonly>
  <input id="ps" placeholder="Police Station" readonly>
  <input id="datetime" placeholder="Date & Time" readonly>
  <input id="location" placeholder="Location" readonly>

  <select id="designation">
    <option value="">Select Designation</option>
    <option>IP</option>
    <option>SI</option>
    <option>ASI</option>
    <option>SCPO</option>
    <option>CPO</option>
  </select>

  <input id="sign" placeholder="Officer Name">
  <button id="saveBtn" onclick="saveData()" disabled>SAVE</button>

  <!-- Overlay loader -->
  <div class="overlay" id="loader">
    <div class="spinner"></div>
    <p id="loaderText">Loading...</p>
  </div>

  <!-- Success popup -->
  <div class="success-popup" id="successPopup">✅ Data Saved Successfully!</div>
</div>

<script>
// ---------------- URL ID ----------------
const params = new URLSearchParams(window.location.search);
const id = params.get("id") || "";
document.getElementById("id").value = id;

// ---------------- Live Date & Time ----------------
function updateDateTime(){
  const now = new Date();
  document.getElementById("datetime").value = now.toLocaleDateString("en-GB") + " " + now.toLocaleTimeString("en-GB");
}
updateDateTime();
setInterval(updateDateTime, 1000);

// ---------------- Geolocation ----------------
navigator.geolocation.getCurrentPosition(
  pos => document.getElementById("location").value = `${pos.coords.latitude},${pos.coords.longitude}`,
  () => document.getElementById("location").value = "Location denied",
  { enableHighAccuracy:true }
);

// ---------------- Loader Controls ----------------
function showLoader(text="Loading...") {
  document.getElementById("loaderText").innerText = text;
  document.getElementById("loader").style.display = "flex";
}
function hideLoader(){
  document.getElementById("loader").style.display = "none";
}

// ---------------- Success Popup ----------------
function showSuccessPopup(){
  const popup = document.getElementById("successPopup");
  popup.style.display = "block";
  setTimeout(()=> popup.style.display="none", 2000);
}

// ---------------- Fetch from Sheet1 ----------------
async function fetchData(){
  if(!id) return;
  showLoader("Fetching data...");
  const sheet1URL = "https://script.google.com/macros/s/AKfycbyfx8w8ZPyQ-t5xw1IScj7eJMG-HEnLYEB8H031DHtMaRsYj0mzpJJbnvOSDgCSqr3_/exec"; // <-- replace with your GET URL
  try{
    const res = await fetch(`${sheet1URL}?id=${id}`);
    const data = await res.json();
    if(data.status==="success"){
      document.getElementById("point").value = data.point || "";
      document.getElementById("place").value = data.place || "";
      document.getElementById("ps").value = data.ps || "";
    } else alert(data.message);
  } catch(e){
    console.error(e);
    alert("Failed to fetch data from Sheet1");
  } finally{
    hideLoader();
  }
}
fetchData();

// ---------------- Enable SAVE ----------------
const designation = document.getElementById("designation");
const sign = document.getElementById("sign");
function toggleSaveBtn(){
  document.getElementById("saveBtn").disabled = !designation.value.trim() || !sign.value.trim();
}
designation.addEventListener("change", toggleSaveBtn);
sign.addEventListener("input", toggleSaveBtn);

// ---------------- Save to Sheet2 ----------------
async function saveData(){
  const btn = document.getElementById("saveBtn");
  const id = document.getElementById("id").value;
  const datetime = document.getElementById("datetime").value;
  const location = document.getElementById("location").value;
  const point = document.getElementById("point").value;
  const place = document.getElementById("place").value;
  const ps = document.getElementById("ps").value;
  const designationVal = designation.value;
  const signVal = sign.value;

  if(!id || !signVal){
    alert("ID or Officer Name missing");
    return;
  }

  const data = { id, point, place, datetime, location, ps, designation: designationVal, sign: signVal };

  btn.disabled = true;
  showLoader("Saving data...");

  const sheet2URL = "https://script.google.com/macros/s/AKfycbyfx8w8ZPyQ-t5xw1IScj7eJMG-HEnLYEB8H031DHtMaRsYj0mzpJJbnvOSDgCSqr3_/exec"; // <-- replace with your POST URL

  try{
    const res = await fetch(sheet2URL, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data),
      mode:"no-cors" // necessary for Google Apps Script POST
    });

    hideLoader();
    showSuccessPopup();

    // Clear fields
    document.getElementById("sign").value = "";
    designation.value = "";
    btn.disabled = true;

 setTimeout(() => {
      window.location.href = "index.html";
    }, 3000);

  } catch(err){
    console.error(err);
    hideLoader();
    alert("Network error. Check console.");
    btn.disabled = false;
  }
}
</script>
</body>
</html>
