<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wayanad Police</title>
  <style>
    /* Reset and body styling */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #eef2ff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
    }

    /* Container box */
    .box {
      text-align: center;
      background: white;
      padding: 80px 30px;  /* taller container */
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 320px;
      max-width: 90%;
    }

    /* Headings */
    h1 {
  color: #1d4ed8;       /* police-blue color */
  margin: 0 0 10px 0;   /* small space below heading */
  font-size: 32px;      /* slightly larger for prominence */
  font-weight: 700;     /* bolder for authority feel */
  text-align: center;     /* aligned to center of container */
  line-height: 1.2;     /* tighter spacing for compact look */
}

    h2 {
      color: #1d4ed8;
      margin-bottom: 25px;
      font-size: 25px;
      font-weight: 500;
    }

    /* Square Button */
    .square-btn {
      width: 100px;
      height: 100px;
      background: #1d4ed8;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      transition: background 0.3s;
    }

    .square-btn img {
      width: 80px;
      border-radius: 10px;
    }

    .square-btn:hover {
      background: #163bb5;
    }

    /* Label under button */
    .label {
      margin-top: 12px;
      font-size: 17px;
      color: #333;
      font-weight: 500;
    }

    /* Loading text */
    #loading {
      display: none;
      margin-top: 20px;
      color: #555;
      font-size: 16px;
      font-weight: 400;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>WAYANAD POLICE</h1>
    <h2>Patta Book Signing System</h2>

    <!-- Square Scanner Button -->
    <button onclick="goScanner()" class="square-btn" aria-label="Open QR Scanner">
      <img src="images/scanner.png" alt="QR Scanner Icon">
    </button>

    <div class="label">Scan QR code</div>

    <!-- Loading -->
    <div id="loading">
      ⏳ Opening Scanner...
    </div>
  </div>

  <script>
    function goScanner(){
      const loading = document.getElementById("loading");
      const btn = event.currentTarget;
      btn.disabled = true; // prevent double clicks

      loading.style.display = "block";

      setTimeout(()=>{
        window.location.href = "scanner.html";
      }, 1000);
    }
  </script>
</body>
</html>
